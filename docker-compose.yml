# Chạy trên VPS: docker compose up -d
# 2 service: bot (uvicorn) + caddy (reverse proxy tự lấy SSL Let's Encrypt).
# State (lịch sử khách, stats, CRM meta, persona) nằm ở ./data + ./.env trên HOST -> update image không mất.

services:
  bot:
    image: ${IMAGE:-hondastone-bot:latest}
    restart: always
    environment:
      - RESTART_MODE=exit          # nút Restart trên dashboard -> thoát, compose tự dựng lại
      - PYTHONIOENCODING=utf-8
      - TZ=Asia/Ho_Chi_Minh        # giờ trong log/CRM/_now_str đúng múi VN (cần tzdata trong image)
    volumes:
      - ./.env:/app/.env                              # cấu hình + secret (sửa qua dashboard)
      # Firebase (nguồn chính conversations + stats): scp key lên VPS cạnh compose.
      # .env đã đặt FIREBASE_CRED khớp tên file dưới + FIREBASE_DB_URL.
      - ./hon-da-c0444-67c2f3e5de10.json:/app/hon-da-c0444-67c2f3e5de10.json:ro
      - ./data/conversations:/app/conversations       # lịch sử chat + <psid>.crm.json
      - ./data/stats:/app/stats                       # thống kê token/chi phí/sự kiện
      # persona + bảng sản phẩm. Mount ĐÈ thư mục trong image -> sửa Personal.md ở local phải
      # copy lên host (deploy.sh tự scp), build lại image KHÔNG đủ.
      - ./data/docs:/app/Document_ChatBot_Mess
    expose:
      - "7900"

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:?đặt DOMAIN trong .env deploy, vd hondastone.duckdns.org}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data          # cert Let's Encrypt (giữ qua restart, tránh xin lại bị rate-limit)
      - caddy_config:/config
    depends_on:
      - bot

volumes:
  caddy_data:
  caddy_config:
