services:
  - type: web
    name: spiritstone-ai
    runtime: python
    buildCommand: pip install -e .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: development
      - key: OPENROUTER_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: MESSENGER_VERIFY_TOKEN
        value: placeholder
      - key: MESSENGER_PAGE_TOKEN
        value: placeholder
